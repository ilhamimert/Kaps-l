workflows:
  ios-build-test:
    name: CrossRoads iOS (Build Test)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter create (Xcode project olustur)
        script: |
          flutter create . \
            --project-name crossroads \
            --org io.crossroads \
            --platforms ios \
            --no-overwrite
          rm -f ios/Podfile ios/Podfile.lock
          rm -rf ios/Pods
          sed -i '' \
            -e 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            ios/Runner.xcodeproj/project.pbxproj

      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter build verbose (hata tespiti)
        script: |
          flutter build ios --debug --no-codesign --verbose \
            2>&1 | tee /tmp/flutter_verbose.log || true
          echo "=== kernel_snapshot / error satirlari ==="
          grep -i "error\|exception\|failed\|kernel_snapshot" /tmp/flutter_verbose.log | head -60

      - name: IPA olustur (Sideloadly icin)
        script: |
          APP=$(find build/ios/Debug-iphoneos -maxdepth 1 -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ] || [ ! -f "$APP/Info.plist" ]; then
            echo "HATA: Runner.app bulunamadi"
            echo "Mevcut klasorler:"
            find build/ios -maxdepth 2 -type d 2>/dev/null || true
            exit 1
          fi
          echo "Bulunan: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r crossroads-unsigned.ipa Payload/
          rm -rf Payload
          ls -lh crossroads-unsigned.ipa

    artifacts:
      - crossroads-unsigned.ipa
      - /tmp/flutter_verbose.log
