workflows:
  ios-build-test:
    name: CrossRoads iOS (Build Test)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter create (Xcode project olustur)
        script: |
          flutter create . \
            --project-name crossroads \
            --org io.crossroads \
            --platforms ios \
            --no-overwrite

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install

      - name: Flutter build iOS (no signing)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log
