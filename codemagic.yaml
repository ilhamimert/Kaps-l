workflows:
  ios-build-test:
    name: CrossRoads iOS (Build Test)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile

    environment:
      flutter: stable
      xcode: 16  # latest yerine 16.x - kernel_snapshot uyumsuzlugunu önler
      cocoapods: default

    scripts:
      - name: Ortam bilgisi
        script: |
          flutter --version
          xcodebuild -version

      - name: Flutter create (Xcode project olustur)
        script: |
          flutter create . \
            --project-name crossroads \
            --org io.crossroads \
            --platforms ios \
            --no-overwrite
          rm -f ios/Podfile ios/Podfile.lock
          rm -rf ios/Pods
          sed -i '' \
            -e 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            ios/Runner.xcodeproj/project.pbxproj

      - name: Flutter pub get
        script: |
          flutter pub get

      - name: xcodebuild Release (imzasiz)
        script: |
          # Release modu: AOT (gen_snapshot) kullanir, kernel_snapshot yok
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SYMROOT="$(pwd)/build/ios" \
            2>&1 | tee flutter_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== xcodebuild exit: $BUILD_EXIT ==="
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== HATA SATIRLARI ==="
            grep -E "error:|Error:|Exception|FAILED|gen_snapshot|kernel_snapshot" \
              flutter_build.log | grep -v "^note:" | head -40 || true
            echo "=== SON 60 SATIR ==="
            tail -60 flutter_build.log
          fi
          exit $BUILD_EXIT

      - name: IPA olustur (Sideloadly icin)
        script: |
          echo "=== Runner.app ara ==="
          find . -name "Runner.app" -type d 2>/dev/null \
            | grep -v Intermediates | grep -v iphonesimulator

          APP=$(find . -name "Runner.app" -type d 2>/dev/null \
            | grep -v Intermediates \
            | grep -v iphonesimulator \
            | head -1)

          if [ -z "$APP" ]; then
            echo "HATA: Runner.app bulunamadi!"
            exit 1
          fi

          echo "Secilen: $APP"

          if [ ! -f "$APP/Info.plist" ]; then
            echo "HATA: Info.plist yok - build tamamlanmamis"
            ls -la "$APP/"
            exit 1
          fi

          APP_SIZE=$(du -sm "$APP" | cut -f1)
          echo "Boyut: ${APP_SIZE} MB"
          ls "$APP/"

          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r crossroads-unsigned.ipa Payload/
          rm -rf Payload

          IPA_SIZE=$(du -sh crossroads-unsigned.ipa | cut -f1)
          echo "BASARILI: crossroads-unsigned.ipa ($IPA_SIZE)"

    artifacts:
      - crossroads-unsigned.ipa
      - flutter_build.log
