workflows:
  ios-build-test:
    name: CrossRoads iOS (Build Test)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter create (Xcode project olustur)
        script: |
          flutter create . \
            --project-name crossroads \
            --org io.crossroads \
            --platforms ios \
            --no-overwrite
          # CocoaPods kalintisini temizle
          rm -f ios/Podfile ios/Podfile.lock
          rm -rf ios/Pods
          # Xcode imzalama gereksinimini kaldır
          sed -i '' \
            -e 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            ios/Runner.xcodeproj/project.pbxproj

      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter build iOS (imzasiz)
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=FLUTTER_BUILD_MODE=release

      - name: IPA olustur
        script: |
          APP=$(find build/ios -name "*.app" | grep -v Simulator | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r crossroads-unsigned.ipa Payload/
          rm -rf Payload

    artifacts:
      - crossroads-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log
