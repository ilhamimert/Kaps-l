workflows:
  ios-build-test:
    name: CrossRoads iOS (Build Test)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile

    environment:
      flutter: stable
      xcode: 16
      cocoapods: default

    scripts:
      - name: Ortam bilgisi
        script: |
          flutter --version
          xcodebuild -version
          dart --version

      - name: Flutter create + pub get
        script: |
          flutter create . \
            --project-name crossroads \
            --org io.crossroads \
            --platforms ios \
            --no-overwrite
          rm -f ios/Podfile ios/Podfile.lock
          rm -rf ios/Pods
          sed -i '' \
            -e 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            ios/Runner.xcodeproj/project.pbxproj
          flutter pub get
          echo "=== Cozulen paket versiyonlari ==="
          flutter pub deps --no-dev 2>&1 | head -50

      - name: flutter assemble (Dart kernel derleme testi)
        script: |
          # xcodebuild'in calistirdigi ayni adim - ama dogrudan calisiyor
          # Hata varsa burada acikca goruruz
          mkdir -p /tmp/flutter-assemble-out
          flutter assemble \
            --output=/tmp/flutter-assemble-out \
            -dTargetPlatform=ios \
            -dBuildMode=debug \
            -dTargetFile=lib/main.dart \
            -dIosArchs=arm64 \
            -dDartObfuscation=false \
            debug_ios_bundle_flutter_assets \
            2>&1
          echo "=== flutter assemble exit: $? ==="

      - name: xcodebuild Release (imzasiz)
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SYMROOT="$(pwd)/build/ios" \
            2>&1 | tee flutter_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== xcodebuild exit: $BUILD_EXIT ==="
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== HATALAR ==="
            grep -E "error:|Error:|Exception|kernel_snapshot|gen_snapshot" \
              flutter_build.log | grep -v "^note:" | head -40 || true
            echo "=== SON 40 SATIR ==="
            tail -40 flutter_build.log
          fi
          exit $BUILD_EXIT

      - name: IPA olustur (Sideloadly icin)
        script: |
          APP=$(find . -name "Runner.app" -type d 2>/dev/null \
            | grep -v Intermediates \
            | grep -v iphonesimulator \
            | head -1)

          if [ -z "$APP" ] || [ ! -f "$APP/Info.plist" ]; then
            echo "HATA: Gecerli Runner.app bulunamadi"
            find . -name "Runner.app" -type d 2>/dev/null
            exit 1
          fi

          echo "App: $APP ($(du -sh "$APP" | cut -f1))"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r crossroads-unsigned.ipa Payload/
          rm -rf Payload
          echo "BASARILI: $(du -sh crossroads-unsigned.ipa | cut -f1)"

    artifacts:
      - crossroads-unsigned.ipa
      - flutter_build.log
