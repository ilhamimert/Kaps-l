workflows:
  ios-build-test:
    name: CrossRoads iOS (Build Test)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter create (Xcode project olustur)
        script: |
          flutter create . \
            --project-name crossroads \
            --org io.crossroads \
            --platforms ios \
            --no-overwrite

      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter build iOS (imzasiz)
        script: |
          flutter build ios --no-codesign --release

      - name: IPA olustur
        script: |
          APP=$(find build/ios -name "*.app" | grep -v Simulator | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r crossroads-unsigned.ipa Payload/
          rm -rf Payload

    artifacts:
      - crossroads-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log
