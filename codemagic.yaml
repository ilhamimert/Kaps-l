workflows:
  ios-build-test:
    name: CrossRoads iOS (Build Test)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter create (Xcode project olustur)
        script: |
          flutter create . \
            --project-name crossroads \
            --org io.crossroads \
            --platforms ios \
            --no-overwrite

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install

      - name: Xcode build (imzasiz)
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            SYMROOT=$(pwd)/build/ios

      - name: IPA olustur
        script: |
          APP=$(find build/ios -name "*.app" | grep -v Simulator | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r crossroads-unsigned.ipa Payload/
          rm -rf Payload

    artifacts:
      - crossroads-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log
