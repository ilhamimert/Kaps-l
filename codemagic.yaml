workflows:
  ios-build-test:
    name: CrossRoads iOS (Build Test)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter create (Xcode project olustur)
        script: |
          flutter create . \
            --project-name crossroads \
            --org io.crossroads \
            --platforms ios \
            --no-overwrite
          rm -f ios/Podfile ios/Podfile.lock
          rm -rf ios/Pods
          sed -i '' \
            -e 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            ios/Runner.xcodeproj/project.pbxproj

      - name: Flutter pub get + analyze
        script: |
          flutter pub get
          flutter analyze 2>&1 || true

      - name: Dart derleyici kontrolu
        script: |
          dart analyze lib/ 2>&1
          echo "Dart analyze exit: $?"

      - name: Flutter build iOS (imzasiz)
        script: |
          flutter build ios --debug --no-codesign 2>&1 | tee flutter_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== Flutter build exit: $BUILD_EXIT ==="
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== TAM HATA LOGU ==="
            cat flutter_build.log
          fi
          exit $BUILD_EXIT

      - name: IPA olustur (Sideloadly icin)
        script: |
          # flutter build ios ciktisi: build/ios/iphoneos/Runner.app
          APP=$(find build/ios -name "Runner.app" -type d \
            -not -path "*/Intermediates*" \
            -not -path "*/iphonesimulator*" \
            -not -path "*/DerivedData*" | head -1)
          if [ -z "$APP" ]; then
            echo "HATA: Runner.app bulunamadi"
            find build/ios -maxdepth 3 -type d 2>/dev/null | head -30
            exit 1
          fi
          echo "Bulunan: $APP"
          echo "Icerik:"
          ls "$APP/" | head -20
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r crossroads-unsigned.ipa Payload/
          rm -rf Payload
          ls -lh crossroads-unsigned.ipa

    artifacts:
      - crossroads-unsigned.ipa
      - flutter_build.log
