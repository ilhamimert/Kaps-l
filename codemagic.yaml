workflows:
  ios-build-test:
    name: CrossRoads iOS (Build Test)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter create (Xcode project olustur)
        script: |
          flutter create . \
            --project-name crossroads \
            --org io.crossroads \
            --platforms ios \
            --no-overwrite
          rm -f ios/Podfile ios/Podfile.lock
          rm -rf ios/Pods
          sed -i '' \
            -e 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            ios/Runner.xcodeproj/project.pbxproj

      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Flutter build iOS (imzasiz)
        script: |
          # Flutter build basarili olsa da olmasa da devam et.
          # "Failed to build iOS app: Development Team" hatasi deploy check'inden geliyor,
          # ama Xcode build tamamlanmis oluyor.
          flutter build ios --debug --no-codesign 2>&1 | tee flutter_build.log || true
          echo "=== Build ciktisi ==="
          tail -20 flutter_build.log

      - name: Runner.app bul ve IPA olustur
        script: |
          echo "=== Tum Runner.app yollari ==="
          find . -name "Runner.app" -type d 2>/dev/null | grep -v Intermediates | grep -v iphonesimulator

          # iphoneos build'ini sec
          APP=$(find . -name "Runner.app" -type d 2>/dev/null \
            | grep -v Intermediates \
            | grep -v iphonesimulator \
            | head -1)

          if [ -z "$APP" ]; then
            echo "HATA: Runner.app bulunamadi!"
            find . -maxdepth 8 -name "*.app" -type d 2>/dev/null | head -20
            exit 1
          fi

          echo "Secilen: $APP"

          if [ ! -f "$APP/Info.plist" ]; then
            echo "HATA: Info.plist yok - Xcode build tamamlanmamis"
            ls -la "$APP/" 2>/dev/null || echo "(bos)"
            exit 1
          fi

          echo "Info.plist: VAR"
          APP_SIZE=$(du -sm "$APP" | cut -f1)
          echo "Boyut: ${APP_SIZE} MB"
          ls "$APP/" | head -20

          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r crossroads-unsigned.ipa Payload/
          rm -rf Payload

          IPA_SIZE=$(du -sh crossroads-unsigned.ipa | cut -f1)
          echo "IPA olusturuldu: crossroads-unsigned.ipa ($IPA_SIZE)"

    artifacts:
      - crossroads-unsigned.ipa
      - flutter_build.log
